流寓厯齊陳隋唐宋雖建置不一俱為端州元符中以潛邸舊號升興慶軍又改肇慶唐以前皆𨽻廣西元再更尋復屬廣東國朝為府領州一德慶州縣十高要四㑹新興陽春陽江高明恩平瀧水封川開建上三縣俱𨽻德慶控江帶山延袤千里本志據全省上游受湘桂林以上俱湘江潯潯州至栁慶江衆委州邑境內猺峒纍纍棧居陸梁䖍劉我民嶺西用武地也東北界于清逺或稍寧戢東南以降雙魚近陽春海朗近恩平俱千戶所恩平恩平屬海陵陽江屬俱巡司恩恩平陽陽江陽春之濵寇棹常擾而高高要新新興開開建封封川銅陵陽春古名瀧水德慶則半西土為獠穴經年固蒂之憂何時則釋嘗稽往牒審時宜凡關隘營堡尺寸不可失者髙要三白泥徑雲初大石恩平三白䝉徑石岡那關陽春三古良錢鑿三甲髙明二文隴朱塘封川二西河迪田開建一賀縣東安鄉大灘瀧水三鐡場雲青龍角德慶三羅傍緑水大刀其恩陽陽江㑹處鹿圍黃竹槁為髙雷亷瓊要衝昔固有張幟橫行者若新新興黃三坑要地髙高要各邑險扼雖多而端溪德慶古名獨以百計故鎮以守備爰轄外戍復統于參將署在府治制于兵備署在府治法蓋密矣議者欲于西山陽春地四峒雲廉參大小龎相思湖東戈鐡平曠之地提兵據其腹心羅傍西去三十里峝曰下城地廣田腴天險四設欲徙兵署千戶所及巡司都城控之皆長䇿也乃若變通宜民恩平則時詘舉贏當截新㑹有餘以濟燒眉仍節縣驛之費于往返蒼梧諸司或亦小補云惟兹孝肅宋待制包拯嘗為州刺史遺愛洽于民夷八賢八賢祠祀唐中書令張東之太尉李紳宋少師劉摯右正言鄒浩學士胡寅編修胡銓丞相留正少傅張世傑勸旌久而益振當必有慕而推諸政者肇慶府圖紀領州一縣十倉八巡司二十一河泊所四水馬驛十三戶口戶五萬二千一十六口二十一萬七千一百四十田糧課稅官民僧尼道竈田地山塘三萬八千五百一十二頃三十二畝九分二毫六絲四忽夏稅麥一百零四石九斗八升六合二勺七抄七撮九圭三粟秋糧米一十六萬一千四百八十四石七斗八升一合五勺一抄六撮二圭六粟農桑本色米一十五石九斗四升七合三抄商稅等鈔四萬一千二百三十七貫九百七十一文魚課折色米三千九百七十二石一斗九升四合黃麻熟鐡魚膠共折價銀一百二十四兩八錢七分七釐九毫肇慶衛合屬屯田額徵細糧一萬八千三百八十石新興所屯田額徴八十頃二十畝細糧三千三百六十石陽江所屯田額徴四十八頃九十畝細糧一千四百六十六石德慶所屯田額徴細糧二千零一十六石官兵馬匹肇慶衛并合屬額設各官六十九員旗軍七百九二名馬十匹四㑹所額設各官十五員旗軍二百五十五名馬無新興所額設各官十五員旗軍二百四十五名馬無直𨽻都司陽江所額設各官十五員旗軍三百八十一名馬三匹直𨽻都司德慶所額設各官十五員旗軍二百九十名馬無直𨽻都司瀧水所額設各官十五員旗軍三百五十五名馬無直𨽻都司肇慶衛德慶所達官旗目舍共四十員名民壯二千九百四十九名弓兵一千一百三十七役高州府圖說高州府漢末孫權以合浦之高凉縣置高凉郡梁置高州厯隋五代炎宋因革屢異元為路𨽻海北道國朝為府洪武八年改為州尋復以化州及二縣來屬凡領州一縣五茂名電白信宜吳川石城二縣俱𨽻化州土厚而山環繞寰宇記州居三廣之間郡據叢山之險圖經東聫肇廣西達雷亷北枕蒼梧南憑溟海梁太守李遷仕曾以其地叛自洗氏梁高凉太守馮寶妻後封石龍太夫人祖孫馮盎高州總管洗孫也立竒功宇乃寖寧惟郡北猺山充斥直踵于西賊熖時張歲為民厲列邑固均信宜尤慘人亡則田隨以據池魚林木後殃邇在潘州古名之蕭牆故巡司要守則中道信宜凌祿石城平山林茂名梁家沙化州營隘重地茂名則四十有竒電白則三十有竒化州石城則逺近相半而良化黃海連峒七甲天門金岡石村三橋陸觀關塘平定獅子等屯猺峒通衢我疆域剝牀之災也議者欲復高凉舊邑于電白之廢基以控諸寨衛府城招集狼人土猺于信宜久失之地以耕以守以攻以恢我舊物復裁三合僻驛之供以募驍勇立堠斥是或一道焉其寧村吳川地赤水茂名地俱巡司之墟倭變或生于肘腋神電衛在電白縣所轄一帶海澚防禦號令兵符重寄尤不當托之匪人守疏則釁益熾功成而農亦妨詩曰百室盈止婦子寧止又曰知我如此不如無生古今人情全不隔絶繭絲保障顧吾所以慎之何如耳高州府圖紀領州一縣五遞運所一倉六巡司七河泊三水馬驛六戶口戶二萬二千八百四十八口八萬六千零六十七田糧課稅官民田地山塘一萬四千九百二十九頃二十八畝七分五釐四毫九絲四忽夏稅米八十四石七斗二升三合六勺秋糧米六萬七千九百四十六石三斗八升二合一勺四抄九撮農桑本色米三十六石商稅等鈔二萬六千零五十貫五百五十二文魚課折色米二千四百一十四石七斗六升八合五勺熟鐡八千九百一十三斤八兩六錢魚膠六十四斤五錢一分一釐黃麻一千九百八十一斤二錢七分五釐六毫神電衛額徵細糧一萬一千四百二十四石高州所額徵細糧五百四十六石雙魚所額徵細糧六百三十石官兵馬匹神電衛并合屬額設各官六十九員旗軍九百六十八名馬二十一匹高州雙魚信宜陽春寧川五所額設各官共七十五員旗軍一千九百二十名馬三十四匹神電衛達官旗目舍共二十八員名民壯六百五十九名弓兵一百九十役廉州府圖說廉州府古合浦郡吳為珠官郡尋復劉宋置越州郡厯隋梁唐各易置貞觀中改廉州宋改太平軍尋復之元置路我國初為府洪武八年復為州以欽州為縣并合浦靈山石康領之以𨽻于雷十四年仍歸為府欽