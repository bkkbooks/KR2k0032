body:
  text: 嶺海輿圖明姚虞撰嶺海總圖說廣東雖古百粵地書載唐堯命羲叔宅南交史稱蒼梧九疑韶石皆舜跡所至之地不得為荒服周宣時召穆公虎疆理淮濆遂至于南海肆入秦併乃郡邑于厯代幅員寖廣居嶺海之間受天地之盡氣丘文莊舊志封疆跨躡海陸㑹同唐王勃記而地靈人傑罔下中州古稱樂土焉北負雄南雄府韶韶州府以臨吳江西楚湖廣東肩潮潮州府惠惠州府以制甌閩福建高高州府亷亷州府門户西排交交趾桂廣西之梯航嶺嶺東兵備嶺南兵備嶺西兵備雷廉四府參將海海道副使嶺南兵備崖州參將藩籬外扼黎諸黎猺夷諸外夷之喉舌矧征蠻重兵據蒼梧上流舶𣙜鹽徵魚蛤諸課之羡頗貸餉乏前此真一大都今則否矣生齒日繁官輸日重嚚訟日滋無經日耗師旅因仍漁獵踵至而游民逐末山海礦冶厲階番舶釁端時復汪洋巉屼蜂聚狐潛噪呼羣起剽掠無忌而戎事且弛凡此民患十郡符合卧榻隱憂噬臍後禍豈獨黎獠夷酋已哉外馳富饒內實貧困今之廣東蓋甚有可慨焉者我有官君子仰藉神祖混一偉功列聖承平之福皇上宵旰南顧為民任人俾皆粱肉大厦泮奐兹土匪民曷依於戲靖共爾位無或素餐覽圖稽叙若紀安養生息理亂利弊刑賞攻守思過半矣司馬公曰有治人無治法君子念之樂土其漸復乎嶺海輿圖總紀布政司嶺南道糧儲道嶺東道清軍道嶺西道督糧道按察司嶺南道清軍道提學道海東道屯田道備鹽法道嶺南兵道嶺東道兵備帶管海北道兵備帶管嶺西道兵備帶管海南道兵備帶管領府十州七縣六十五鹽課提舉司二廣東所屬場十四海北所屬場九市舶提舉司一都司領衛一十五屬所一百零五直𨽻所九戶口官吏軍民匠役校尉力士竈蛋等戶共四十九萬一千三百一十二戶口共二百零二萬零一百一十九口田糧官民田地園塘池灣埔港共二十五萬六千七百四頃七十五畝三分夏稅麥共該正耗稅四千三百九十六石四斗一升六合九勺七抄豆共該正耗稅八斗一合二勺米共該正耗稅一千六百五十一石二斗四合二勺五抄九撮八圭六粟五粒秋糧共該正耗糧一百零一萬一千七百九十八石一斗四升四合五勺九抄八撮六圭一粟四粒農桑本色米共三百零七石五斗一升六合四勺六抄商稅等鈔共六十一萬一千八百零八貫三百八十五文魚課折色米共三萬五千零一十八石五斗三升三合二勺一抄魚膠翎毛銅鐡黃麻等料課共折價銀五百八十四兩九錢二分一釐九毫七絲二忽外高州府原止計斤數未算折價詳在本府紀下廣東鹽課提舉司共稅熟鹽八萬九千二百八十五引零二百四十五斤六兩三錢六分海北鹽課提舉司共稅熟鹽一萬三千一百七十五引零五十九斤八兩屯糧共一十八萬三千二百九十五石五斗一升一合七勺一抄五撮官兵馬匹器械都司合屬額設官一千八百六十八員旗軍三萬九千七百七十名見在六百五十四匹見在達官指揮千百户鎮撫共一百七十一員總小旗頭目達舍共七百九十四名每衛六瓣明襯盔各二十頂齊腰甲二十付角弓五十張弦一百條破甲鐡箭三千九百七十六枝皮撒袋五十付腰刀五十把斬馬刀二十把勒甲皮帶二十條虎頭牌四十面朗機銃管二十把提銃一箇神機螺螄箭各二百五十枝鈎刀十張眉刀二十張短鎗五十根弩五十把每千戶所六瓣明襯盔五頂齊腰甲五付角弓十五張弦三十條破甲鐡箭八百八十二枝皮撒袋十付腰刀十把斬馬刀五把勒甲皮帶五條虎頭牌十面朗機銃管十把提銃一箇神機螺螄箭各一百枝鈎刀五張眉刀十張短鎗二十根弩二十把額編民壯共一萬八千一百一十三名弓兵共六千九百三十二役廣州府圖說廣州府古揚州南境秦始置南海郡趙他實據之山川緬邈元南海志上據石門之隘下瞰扶胥之險長江天塹壁壘完整舊志國朝為府元以前沿革不一以下列郡俱同領州一連州縣凡十有四附郭南海番禺外順德三水從化東莞增城龍門香山新㑹新寧清逺陽山連山三縣𨽻連州包山帶海羣邑羅衛外郡倚以為重故于此置省而責亦重焉黃涌順德地白墳波羅海口南岡鹿步海口已上三營俱守備指揮防禦廣海衛近新寧大鵬千戶所近東莞香山崖門新㑹地沿海東南戍守之嚴湟川連州古名有守備都指揮陽陽山連連山朱岡星子俱巡司𨽻陽山西北叢嶂實湘臨武江華俱湖廣衡州屬縣桂賀縣懷集俱廣西平梧屬縣咽喉殆亦次之而三水參巨浸之派胥江新㑹地當三鎮廣韶肇之中帆檣上下烏合突來樓船屯哨其可緩乎環郡大洋萬支莫測風濤千里皆盜賊淵藪英英德縣𨽻韶州陽陽山之交移山藉火民猺糅居水陸恆病故清逺慶安東莞古名各轄以兵憲重臣其勢均也然兵食相須官民一體番番禺南南海邑若獨大而當省會民亦獨勞曷以節之東東莞增增城順順德會新會僅充歲用曷以贏之香香山清清逺而下疲亦久矣曷以舒之均之惟兹陶晉桓公侃廣州刺史宋唐宰相璟廣州都督韓唐昌黎公陽山令向宋丞相敏中知廣州井棠冉冉濂溪時為運判南軒隨父寓連州逺流道澤而清獻宋丞相崔與之增城人所謂諸賢寬得一分則民受一分之賜仰止羣哲典刑伊邇尚亦鑒哉廣州府圖紀領州一縣十二稅課司永豐倉各一遞運所二各州縣巡檢司四十九倉十水馬驛一十八河泊所八戶口戶一十八萬七千九百六十八口五十九萬八千四百九十田糧課稅官民田地山塘灣八萬五千四百四十七頃五十一畝一分六釐八毫七忽夏稅豆八斗一合二勺米八百七十石七斗七升五合七勺秋糧米三十一萬二千四百九十一石五斗五升五合八勺農桑本色米二十一石六斗七升四合商稅等鈔二十六萬一千四百六十六貫一百三十六文魚課折色米一萬一千零四十三石六斗五合五勺零魚膠熟鐡翎毛共折價銀一百零七兩四錢九分七釐一毫一絲五忽廣州左衛合屬屯田額徵二百頃三十三畝零細糧五千五百五十六石八斗七升四合八勺右衛合屬屯田額徵三百四十六頃五十九畝八分零細糧一萬零三百四十二石零二升六合七勺三抄八撮前衛合屬屯田額徵三百四十四頃七十二畝三分零細糧九千九百九十五石一斗八升八合四勺一抄後衛合屬屯田額徵二百四十六頃四十畝細七千三百三十五石零八升三合七勺六抄七撮南海衛合屬屯田額徵二百六十八頃八十畝細糧八千零五十四石廣海衛合屬屯田額徵二百二十頃九十六畝細糧一萬二千七百六十八石清逺衛合屬屯田額徵細糧六千八百六十九石五斗一升九合八勺增城所屯田額徴八十一頃細糧二千九百五十八石從化所屯田額徴一百零三頃六十畝零細糧六千七百二十石新㑹所屯田額徴六十三頃六十畝細糧二千零一十六石官兵馬匹廣州左衛額設各官共八十四員旗軍一千三百四十六名馬八匹右衛額設各官共八十四員旗軍一千七百七十六名馬八匹前衛額設各官共八十四員旗軍一千五百三十一名馬十九匹後衛額設各官共八十四員旗軍一千三百一十七名馬八匹南海衛額設各官共六十九員旗軍一千五百五十四名馬一十七匹東莞大鵬二所額設各官共三十員旗軍六百二十四名馬十匹廣海衛額設各官共六十九員旗軍二千三百八十三名馬十匹新寧香山海朗三所額設各官共四十五員旗軍七百七十名馬無清逺衛額設各官共八十四員旗軍六百四十五名馬三十三匹增城所額設各官一十五員旗軍七百五十六名馬十一匹直𨽻都司從化所額設各官一十五員旗軍三百七十五名馬無直𨽻都司新㑹所額設各官一十五員旗軍六百七十九名馬二匹直𨽻都司廣州四衛達官旗目舍共三百七十六員名民壯四千八百四十四名弓兵二千三百五十五役韶州府圖說韶州府本南海郡地漢平粵𨽻于荆湖廣之桂陽郡桂陽州衡州府屬自吳厯梁俱楚疆隋罷郡始以其地還屬番州唐武德中初置韶州附以四邑五季而上其地屢叛宋元乃定國朝為府降英州英德舊名為縣歸始興于南雄領縣凡六曲江英德翁源樂昌乳源仁化據廣上游北嶺峭嶮南谷平易唐徐浩張文獻公碑控扼五嶺韶為交衝唇齒江江西湘湖廣咽喉交安南廣二廣宋余靖修州衙記亦重地也浛洸英德古名之南蔓延徭峝樂樂昌仁仁化則逼境郴湖廣郴州桂桂陽勢不兩轄而茂林層巒流賊常擾編氓亦彼此搆隙不時乃湘韶之通患故兩鎮兵備湖南則駐于郴陽嶺南則駐于清逺曲江雖曰附郭猺山密邇皆腹心後疾翁源僻在東南二巡司桂山了黃岡居扼塞之區六關隘圖略載當異境之㑹英樂乳仁皆不建兵署所藉以外禦者弓兵各巡司見圖營卒而已豈恃萬人城以內固乎英德湞山有趙他所築萬人城遺址抑役民于農而專生財計乎不可恃者彰彰徵矣所謂生財吾亦惑焉六邑惟曲英差豐餘則漸敝田弗糞農之下也喪必宴奢之薄也乳源豪商江西人蠶食既久乃有客强主弱之諺之數者奚其富惟兹金鑑有堂府治西宋取唐相張九齡千秋金鑑録因建家山有墓府城西有宋尚書余靖墓二公俱曲江人巍蘶百粵嶺海同長監門宋鄭俠以上流民圖編管英州廷丞宋吕祖儉上書語侵韓托胄安置韶州忠國之風餘馨尚播文不在兹乎韶州府圖紀領縣六倉一河泊所一巡司十四水馬驛六戶口戶一萬七千九百三十四口九萬六百五十八田糧課稅官學軍餉輕齎民僧田地山塘一萬一千五百九十頃三十二畝六分九釐七絲三忽夏稅絲折米一十石一斗一升三合麥二百三十二石三斗九升八合六勺秋糧米五萬七百八十六石八斗六升一勺六抄六撮四圭二粟二粒農桑本色米三十石九斗一升五合五勺商稅等鈔八萬五千三百九十九貫八百五十二文魚課折色米二千四百零六石三斗八合三勺黃麻魚線膠熟鐡兵折價銀七十八兩八錢三分九釐九毫韶州所屯田實徴八十頃細糧二千五十二石官兵馬匹韶州所額設各官一十五員旗軍三百七十三名馬無直𨽻都司民壯一千七百五十名弓兵五百八十役南雄府圖說南雄府本始興縣地隋以前俱𨽻衡桂唐武德中又𨽻韶州南漢始割湞陽保昌古名始興置雄州宋開寶以河北亦有雄州因加南以别之𨽻廣東道元為南雄路國朝為府領縣二保昌始興居五嶺之首為二廣之衝羣山環拱三水合流控帶群蠻襟㑹百粵本志韶石突兀聳其南庾嶺嵳峩峙其北舊志匡廬㑹稽洞庭鄱陽長江一帶皆限此巨關庾嶺有關曰嶺南第一關而交南朝鮮諸國臣服西來踰嶺則北望天府衣冠文物凡海內大都足以歆其畏慕莫或覬覦焉者必暫劄於懷逺樓在郡城南建以館夷人者雄其五嶺要地乎但境聮二省每苦流賊雖保昌差寧而始興之陽山坑河溪廟沙田花腰猪子峽已上隘俱通江西等隘堠斥未嚴唇齒固不得偏安也紅梅百順平田俱𨽻保昌黃塘清化俱𨽻始興數巡司已不講訓練又况一所南雄千戶所官軍老羸並計數隊止矣皆久玩無事戈塵甲以屯餉為騙局聚正分竒盲盲胡知且以一郡才領二蕞邑提封廣袤僅四百里夏秋公租不過三萬有竒未當江南一縣之饒而送往迎來為東廣九郡傳郵但幸𣙜料一線之利存焉耳省城畨舶不通將安以支兵食內憂雄實為甚然則奈何𫝊曰備預不虞國之善經又曰常形人不形於人南雄府圖紀領縣二遞運所一稅課司一倉一巡司五水馬驛一戶口戶八千二百九十七口二萬四千六百九十九田糧課稅官民僧道田地山塘九千五百二十一頃四十三畝九分七釐八毫六絲九忽四微七塵夏稅米四