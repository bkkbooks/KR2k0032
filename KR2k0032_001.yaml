陵水疆域似萬關係猶崖若珠崖古名則黎悍而夥長技負固攖之者摧恆勤我兵近雖大定嘉靖壬寅大司馬蔡公經大舉兵討平之亘古未有然種類生齒履霜之漸不可忘也故議者于羅活峝欲據以重兵遲以歲月乃置官兵鎮之其陵水要區之鄰于崖者則界以十字路截其往來竄伏計若得矣任人為難矧占城暹羅諸畨東南對峙時飄風突來暸望實艱邇駐參將于崖嘉靖辛丑黎人亂乃設責任有攸兼也感恩黎衆民稀無城池兵甲恐非長䇿夫以瓊之沃壤中飽豺狼之吻藩籬稍踈時且厲我抱大志者每欲批穴搗巢使幕南空庭不戢自焚而為元人之攻取元取黎地極多達時機者必曰勞來柔誨俾格心向化儕吾赤子而守國初之昭安大率只此二端然其既也各亦有弊於戲嚴武備馭定邊宏綱細目文莊大學士丘公濬瓊人也有名當時之經濟固存執而弗泥變而弗暌可與從政矣瓊州府圖紀領州三縣十遞運所一稅課司一倉七巡司七河泊所七水馬驛十二戶口戶五萬五千五百七十五口二十六萬九百五十八田糧課稅官民田地山園塘二萬三百一十六頃四十三畝八分三釐三絲夏稅米一百五十九石四斗六升四合七勺一抄九撮七圭秋糧米八萬五千五百二十二石五斗一升九合六勺六抄九圭五粟農桑本色米一十二石商稅等鈔四萬七千二百九十七貫六百五十一文魚課折色米四千四百四十三石五斗一升九合八勺魚膠翎毛共折價銀七十七兩八錢五分一釐八毫海南衛屯田額徵四百九十九頃四十畝細糧一萬四千九百八十二石官兵馬匹海南衛并合屬額設各官共八十四員旗軍一千六百一十名馬三十四匹清瀾萬州南山儋州昌化崖州六所額設各官共九十員旗軍二千二百六十九名馬一百三十七匹民壯一千六百八十三名弓兵四百四十役南夷圖說先民有言九服之有要荒如晝之有夜隂之有陽故盛世恆治以不治要在修明內治焉耳古之聖王胥由此選曰食哉惟時柔逺能邇惇德允元而難任人蠻夷率服曰惟德動天無逺弗届曰無怠無荒四夷來王曰明王慎德四夷咸賔故有德者以所樂樂人無德者以所樂樂身眷兹南海諸夷懷德畏威恪謹包茅亦既有年著之祖訓㑹典撫恤獨至而懋遷有無以資我軍國之需亦未嘗不利王者無外何可絶也顧此編氓自决堤坊罔恤狐兔時或椎髮環耳侏􅍣入羣鄉導奸利或誘以婦女易以竒貨陳以官司重輕人情好惡凡我虗實皆了然已久往歲寶安之變正德間佛朗機夷人紿稱入貢突入東莞大肆劫掠盈耳未逺杞人有憂正在叵測君子不可謂之迂也是故審夷情占輿地講制馭稽政教廣幅員儲財用綏逺人尊中國懷方氏恆托寄譯而導使星務俾節鉞丕植獻納必嚴以無愧子卿鄭公或若童貫使遼以為宋無人者亦懼而朂焉則是圖也豈曰小補南夷圖紀安南國本漢交址地語見事紀中國嘗以為郡縣宋始為徼外封為國王國朝洪武二年遣使朝貢其物有金銀器皿熏衣香降真香沉香速香木香黑線香白絹犀角象牙紙扇舶使每至廣永樂中又郡縣之宣德五年復封為國王正德十年黎氏滅其臣莫登庸據而有之貢使不至嘉靖二十年大司馬毛公伯溫蔡公經奉朝命興師討罪莫登庸懼獻四峝地請降詔授都統使二品銜銀印世襲占城國本古越裳氏之界在廣之西南東至海西至瓜哇南接真臘北連安南東北至廣東舟行順風可半月程至崖州可七日程周顯德宋開寶中嘗遣使來貢其物有通犀帶菩薩石犀牙龍腦香藥孔雀馴象熙寧中令於廣州置驛以歸國朝洪武二年其主阿答阿者首遣其臣虎都蠻來朝貢其物有象犀象牙犀角孔雀孔雀尾橘皮抹身香龍腦熏衣香金銀香竒南香土降香檀香柏香燒碎香花梨木烏木蘇木花藤香蕪蔓畨紗紅印花布油紅綿布白綿布烏綿布圓璧花布花紅邉縵雜色縵畨花手巾帕兜羅綿被洗白布泥使回令於廣東布政司管待十四年復來朝貢成化末其國王古來嘗至廣州云暹羅國本暹與羅斛二國在占城南國朝洪武四年其國王參烈昭毗牙遣使臣奈思俚儕刺識悉替等來朝貢進金葉表其物有象象牙犀角孔雀尾翠毛龜筒六足龜寶石珊瑚金戒指銅鼓片腦米腦腦腦油腦柴檀香速香安息香黃熟香降真香羅斛香乳香樹香木香烏香丁香阿魏薔薇水丁皮琬石柴㹴藤竭藤黃硫黃沒藥烏爹泥肉豆䓻胡椒白豆䓻蓽撥蘇木烏木大楓子苾布油紅布白纒頭布紅撒哈剌布紅地絞節智布紅杜花頭布紅邉白暗花布乍連花布烏邉葱白暗花布細棋子花布織人象花文打布西洋布織花紅絲打布剪絨絲雜色紅花被靣織雜絲竹布紅花絲手巾織人象雜色紅文絲縵使回令於廣東布政司管待真臘國本扶南屬國東際海西接蒲甘南連加羅希北扺占城唐武德宋政和中嘗遣使來貢國朝洪武六年其國王忽兒那遣其臣奈亦古郎等來貢其物有象象牙蘇木胡椒黃蠟犀角烏木黃花木土降香寶石孔雀翎使回令於廣東布政司管待爪哇國古本闍婆國東扺古女人國西扺三佛齊國南扺古大食國北界占城國宋淳化大觀中嘗遣使朝貢國朝洪武三年其王昔里八達剌遣其臣八的占必等來朝貢其物有胡椒蓽茇蘇木銅鼓黃蠟烏爹泥金剛子烏木畨紅土薔薇露竒南香檀香麻藤香速香降香木香乳香龍腦血竭肉豆䓻白豆䓻藤竭阿魏蘆薈沒藥大楓子丁皮畨木鱉子悶蟲藥碗石蓽澄茄烏香寶石珍珠錫西洋鐵鐵鎗摺鐵刀苾布油紅布孔雀火雞鸚鵡玳瑁孔雀尾翠毛鶴頂犀角象牙龜筒黃熟香安息香使回令於廣東布政司管待永樂二年復來朝貢滿剌加國在占城南前代不通中國國朝永樂三年其國王西剌八兒速剌遣使奉金葉表來朝貢其物有畨小厮犀角象牙玳瑁鶴頂鸚鵡黑熊黑猿白麂鎖袱金母鶴頂金廂戒指撒哈剌白苾布薑黃布撒都細布西洋布花縵片腦梔子花薔薇露沉香乳香黃速香金銀香降真香紫檀香丁香胡椒血竭烏爹泥象牙肉豆䓻珠母殼沒石子阿魏窩鉛片腦肉果馬腦珠丁皮速香竹布蘇合油烏木蘇木大楓子畨錫畨鹽使回令於廣東布政司管待正統間復來朝貢三佛齊國本南蠻别種在占城南宋建隆初嘗遣使朝貢國朝洪武四年其國王哈剌札八剌卜遣其臣玉的力馬亦里麻思奉金字表來朝貢其物有黑熊火雞孔雀五色鸚鵡諸香兜羅綿被苾布白獺龜筒胡椒肉豆䓻畨油子米腦六年復來朝貢浡泥國本闍婆屬國在西南大海中去闍婆四十五日程去三佛齊四十日程去占城三十日程宋太平興國元豐中嘗遣使來貢國朝洪武四年其國王馬謨沙遣其臣亦思麻逸朝貢其物有珍珠寶石金戒指金縧環龍腦牛腦梅花腦降香沉香速香檀香丁香肉豆䓻黃蠟犀角玳瑁龜筒螺殼鶴熊皮孔雀倒挂鳥五色鸚鵡黑小厮金銀八寶器永樂六年率其妻子來朝卒於南京會同館錫蘭山國前代無考國朝正統十年其國王遣其臣耶把剌謨的里啞等來朝貢其物有寶石珊瑚水晶金戒指撒哈剌象乳香木香樹香土檀香沒藥西洋細布藤竭蘆薈硫黃烏木胡椒碗石使回令於廣東布政司管待天順三年復遣使來貢蘇門答剌國前代無考國朝永樂三年其國王鎖丹罕難阿必鎮遣其臣阿里來朝貢其物有馬犀牛龍涎撒哈剌梭眼寶石木香丁香降真香沉速香胡椒蘇木錫水晶瑪瑙畨刀弓石青回回青硫黃使回令於廣東布政司管待大泥國稱𨽻暹羅助貢國分節年來貿易出産胡椒乳香血竭降香沒藥烏丁泥土檀香蘇木沉香黃檀香藤黃木食子龜筒象牙打麻畨牛角灰筒沉粟香西洋布茭張席寶石蓽撥珠母殼明乳香竹布片腦檀香丁香皮烏木玳瑁急蘭丹國正德四年來貿易出産胡椒烏木丁皮已上二國舊志俱不載今常來貿易故亦存之嘉靖二年禮部照發附本布政司入貢惟暹羅占城滿剌加瓜哇真蠟五國勘合號簿五扇收候來貢比號其佛朗機國前此朝貢不與正德十二年自西海突入東莞縣界守臣通其朝貢厥後劫掠地方乃逐出今不復來廣州舶船出虎頭門始入大洋東洋差近周歲即回西洋差逺兩歲一回東洋船有鶴頂龜筒玳瑁等物西洋船有象牙犀角珍珠胡椒等物其貴細者往往滿舶若暹國産蘇木地悶産檀香其餘香貨各國皆有之若沉香有黃沉烏角沉至貴者蠟沉削之則卷嚼之則柔皆樹楛其根所結惟竒南木乃沉之生結者犀角有烏犀花犀通天犀復通犀花犀者白地黑花通天犀黑地白花復通犀則通天犀白花中復有黑花此皆希世之貴也鶴頂龜筒玳瑁見說可合惟犀角不苟合故公服以玉與犀為帶貴其不茍合之義也凡舟之來最大者為獨檣舶能載一千婆蘭胡人謂三百斤為一婆蘭次曰牛頭船比獨檣得三之一又次曰三木舶曰料河泊遞得之三紹興十七年詔三路舶司畨商販到龍腦沉香丁香白豆䓻四色並抽解一分嶺海輿圖
