body:
  text: 嶺海輿圖地理𩔖三都會郡縣之屬提要臣等謹案嶺海輿圖一卷明姚虞撰虞字澤山莆田人嘉靖壬辰進士官至淮安府知府是編乃其官監察御史時巡按廣東所作凡為圖十有二首為全省圖次十府十圖終以南夷圖圖各有叙叙之例首述沿革形勢利病次州縣次户口次田糧課税次官兵馬疋其總圖則首以職官以布政按察二司分統之盖其時撫按皆為使臣而未定為守土官也其南夷諸國列通貢者於前而通市者亦附後為海防之計不論其奉朔否也大㫖畧於前代而詳於當代畧於山川而詳於扼塞畧於官職而詳於兵馬錢糧畧於文事而詳於武備於志乘之中别為體例然較之侈山水誇人物輯詩文者其有用無用則逈殊矣意古者輿圖不過如是後來者踵事増華失其本耳前有嘉靖壬寅湛若水序極稱之錢曽敏求讀書記亦稱其簡而要云乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀嶺海輿圖原序甘泉子曰以予觀於嶺海輿圖而知王政之易易也夫嶺海輿圖何為者也眀心也昭制也眀心也者以言乎其致善也昭制也者以言乎其行法也吾於嶺海輿圖之編也而知澤山姚侍御之善於巡廣之政之要也故以千言之博汎濫而寡要不若一圖之約目擊而意全有叙有紀皆所以眀圖也是故觀斯圖者其愛民憂國之心油然而生矣雖欲勿善得乎其大綱小紀之制昭然而見矣雖欲勿法得乎故澤山子本孟氏而言曰徒善不足以為政徒法不能以自行一以治善一以治法法善兼全政治畢舉故曰以予觀於是圖而知王政之易易也吾於是編之簡約也而知澤山侍御之善於巡廣之政之要也人謂澤山公發奸摘伏如神者非以是耶考圖撫景自布按都三司而府而州而縣而衛所而合屬稗官某也賢某也否而懲勸焉則其職官率屬信民之政舉之矣入觀其疆而考其山川而物產而田里而戸口而錢糧課稅之贏縮而振作焉則其足食之政舉之矣觀其府州縣之官兵而考軍人民壯之消長馬匹器械之張弛而脩舉焉則其足兵之政舉之矣於制森然於心惕然而善法具備本未兼該内聖外王之道舉之矣雖以措之天下𫝊之後世其可也獨嶺海云乎哉是故觀言不如觀圖觀圖不如觀意故曰書不盡言圖不盡意以意盡圖以圖盡言後之君子當以是觀西村胡郡守鳳存心善政賛美斯圖請梓以廣其𫝊乃俾陳司訓大章於甘泉之野請序其意于簡端云嘉靖壬寅季秋四日増城湛若水序有一鄉之政有一國之政有天下之政有一時之政有一代之政有千萬世之政政者正也正已以正人也作用岐途古今異尚久暫殊功心一而已子孟子涵泳聖涯抱道不辰藐一鄉一國天下之士而尚論焉誦詩讀書必求知其人七篇之說仁義道徳藹如也其論政則曰有其心無其政是謂徒善有其政無其心是謂徒法徒善不足以為政徒法不能以自行於戲盡之矣豪傑之士守而勿替措諸當世往往有大過人者先天下之憂而憂有本者如是茍亦徒法其曷以臻茲總總黔首孰非同胞故君子雖棲遲畎畆恒志在天下國家樂堯舜之道將以唐虞斯世不肯自隘且自私焉矧既委質官箴以人事君謇諤匪躬分也又矧厥監使一方慘舒攸繫引養引恬保合其民而容蓄之每懐靡及周爰咨諏皇華王命若是其重雖假寐有弗遑者疇非此心之運昔者宣公陸子嘗告徳宗矣曰五術省風俗八計聴吏治三科登俊乂四賦經財實六治保罷瘵五要簡官事經濟莫備焉斯一國一代之政推諸天下後世無弗凖矣六者皆羽翼孟氏鑿鑿可行贄其天下士哉顧為政在人事豫迺立有宣公之䇿無文正之憂徒法也有文正之憂無宣公之䇿徒善也徒法則渙渙則民弗從徒善則執執則民弗喻二者得失相因故君子懐古慨今與其渙也寧執予按廣今茲且朞年所謂民隠吏治梳之爬之以求仰答皇上惓惓斯民之念少逭涓埃萬一之責惟時家室溱溱嵗無荒癘蠣田蠏窟蕉林茘浦聖化所被逖哉均矣過河洛而歌禹功有遐思焉爰即所履考成籍酌時宜作嶺海輿圖凡十有二幅各繫以叙以紀俾昕夕顧諟以警惕厥衷予何人哉一鄉鯫生一時管見敢曰一國之政乎又敢以達諸天下後世乎我憂孔疚將無徒法爾乎是故甚不得已也迺君子觀象考文沿時揆事神㑹而加之意亦或少補于政其視十眉五客輞川愈疾雲漢北風生熱生寒重輕緩急則自謂有間因屬胡守鳳梓之以吿各郡之守土者於戲輪轅之飾厚顔于有道者吾知不免諒其心則幸矣姚虞序凡例諸圖不盈方尺故未盡者載諸叙叙或遺者載諸紀凡以翼圖也隨事起義有攸繫焉故先之以凡例一封疆廣袤形勝展促江海源委路道通塞闗隘重輕民夷界限圖紀叙互詳焉若山則圖其大者如羅浮庾嶺五指之類難枚舉也一布按二司各道俱詳著于總紀政所出也一各府衛首領并儒學司獄司隂陽醫學僧綱道紀司各州縣所屬印信衙門原有定額通省俱同茲不復贅止書倉場鹽場逓運所稅課司巡司河泊所水馬驛以其額設不同難以例見且闗係兵食地里者故不可略各州縣有倉無官者不書一戸口田糧屯徵農桑豆麥商税魚課并雜課各府既詳仍括其數于總紀以便稽覈其雜課俱不分𩔖但彚計之從約也一前項等數雖各府所屬但總計之其詳則有司存一官軍馬匹器械止據額數書之中間贏縮不常難以見在局之其達官旗目舍皆每年續撥來者原無成額今但録其見在者以俟稽查其軍器各衛所俱同額數止括計于總紀下省文也一各印信衙門已于圖中標出後仍紀其總額并轄于某衙門雖營堡闗隘亦然不嫌冗瑣互相考見也一叙紀中于各府衛及合屬印信衙門俱界以方格别省亦然其山海營堡闗隘外國猺黎則界以圓圈别内外也一民壯弓兵闗係地方故特書之一隘塞闗津必詳標于圖以嚴備守其不能盡載者則詳于叙叙或不及詳者皆有總數表之若廣肇恵潮瓊等府屬縣多者亦每遺之勢也一各府圖叙俱擇其鄉賢名宦流寓人品功業之卓然者表之景賢示勸徵文獻也一南夷圖止據本朝曽經奉貢及載在祖訓㑹典者書之其山川境土去廣邈逺皆難悉知今但據舊文附入亦不敢盡信若每嵗進貢方物原無額數畨船往來亦無定期故舶課止録其㮣云一圖叙紀所載諸事皆得之一時耳目未必無遺尚賴同志求其所缺于冊外可也
